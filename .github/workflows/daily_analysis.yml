name: AlphaVision Daily Analysis

on:
  schedule:
    - cron: '45 3 * * 1-5'  # 9:15 AM IST (UTC+5:30) = 3:45 AM UTC, weekdays only
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write          # needed to keep workflow active

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlphaVision
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python alphavision_bot.py

      - name: Keep workflow active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "Last run: $(date -u)" > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "chore: keep workflow active [skip ci]"
          git push || true
